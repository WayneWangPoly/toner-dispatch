name: Fix App build

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-app-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repair geocode function block
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import textwrap

          app = Path('src/App.jsx')
          text = app.read_text()

          replacement = textwrap.dedent('''
            async function geocodeAddressWithGoogle(address) {
              const cleanAddress = address?.trim() || "";

              if (!cleanAddress) {
                return {
                  status: "failed",
                  error: "Address is empty before geocoding",
                  address,
                };
              }

              const body = { address: cleanAddress };
              let lastFailure = null;

              if (supabase) {
                try {
                  const { data, error } = await supabase.functions.invoke("geocode-address", {
                    body,
                  });

                  if (!error && data?.status === "success" && data?.lat != null && data?.lng != null) {
                    return data;
                  }

                  lastFailure = {
                    status: "failed",
                    error: error?.message || data?.error || "geocode-address returned no coordinates",
                    google_status: data?.google_status || "",
                    address: data?.address || cleanAddress,
                  };
                } catch (error) {
                  lastFailure = {
                    status: "failed",
                    error: error?.message || "Supabase function invoke failed",
                    address: cleanAddress,
                  };
                }
              }

              if (SUPABASE_URL) {
                try {
                  const response = await fetch(`${SUPABASE_URL}/functions/v1/geocode-address`, {
                    method: "POST",
                    headers: {
                      "Content-Type": "text/plain;charset=UTF-8",
                    },
                    body: JSON.stringify(body),
                  });

                  const data = await response.json().catch(() => null);

                  if (response.ok && data?.status === "success" && data?.lat != null && data?.lng != null) {
                    return data;
                  }

                  lastFailure = {
                    status: "failed",
                    error: data?.error || `Geocode HTTP ${response.status}`,
                    google_status: data?.google_status || "",
                    address: data?.address || cleanAddress,
                  };
                } catch (error) {
                  lastFailure = {
                    status: "failed",
                    error: error?.message || "Direct geocode fetch failed",
                    address: cleanAddress,
                  };
                }
              }

              return lastFailure || {
                status: "failed",
                error: "No geocode request method was available",
                address: cleanAddress,
              };
            }
          ''').rstrip()

          pattern = r'\n  async function geocodeAddressWithGoogle\(address\) \{[\s\S]*?\n\n  useEffect'
          new_text, count = re.subn(pattern, '\n' + replacement + '\n\n  useEffect', text, count=1)

          if count != 1:
              raise SystemExit('Could not replace geocodeAddressWithGoogle block')

          workflow = Path('.github/workflows/fix-app-build.yml')
          if workflow.exists():
              workflow.unlink()

          app.write_text(new_text)
          PY
      - name: Commit fix
        run: |
          git config user.name "fix-app-build-bot"
          git config user.email "fix-app-build-bot@users.noreply.github.com"
          git add src/App.jsx .github/workflows/fix-app-build.yml
          git commit -m "Fix App build after geocode fallback patch"
          git push
