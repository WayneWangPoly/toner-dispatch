name: Build SA suburbs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-suburbs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build suburb table
        run: npm run build:suburbs

      - name: Commit generated suburb table
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/lib/saSuburbs.js
          git commit -m "Generate SA suburb table" || echo "No changes to commit"
          git push
