name: Rename Nikhil

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Rename staff in code
        run: |
          sed -i 's/Nikil/Nikhil/g' src/App.jsx
          sed -i 's/Nikil/Nikhil/g' src/lib/staff.js
          rm -f .github/workflows/rename-nikhil.yml
      - name: Build
        run: |
          npm install
          npm run build
      - name: Commit rename
        run: |
          git config user.name "rename-nikhil-bot"
          git config user.email "rename-nikhil-bot@users.noreply.github.com"
          git add src/App.jsx src/lib/staff.js .github/workflows/rename-nikhil.yml
          git commit -m "Rename Nikil to Nikhil"
          git push
