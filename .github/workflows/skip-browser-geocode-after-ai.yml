name: Skip browser geocode after AI scan

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch App.jsx
        run: |
          python3 <<'PY'
          from pathlib import Path

          app = Path('src/App.jsx')
          text = app.read_text()

          # Add AI-scan marker to extracted data.
          needle = '        manual_location_override: false,\n      };'
          replacement = '        manual_location_override: false,\n        geocode_checked_by_ai: true,\n      };'
          if replacement not in text:
              if needle not in text:
                  raise SystemExit('Could not find extracted object tail')
              text = text.replace(needle, replacement, 1)

          # Pass AI-scan marker into form.
          needle = '              manual_location_override: false,\n            });'
          replacement = '              manual_location_override: false,\n              geocode_checked_by_ai: Boolean(data.geocode_checked_by_ai),\n            });'
          if replacement not in text:
              if needle not in text:
                  raise SystemExit('Could not find setForm object tail')
              text = text.replace(needle, replacement, 1)

          # Add skip flag after hasAiGeocode.
          needle = (
              '  const hasAiGeocode =\n'
              '    hasUsableLatLng(form) &&\n'
              '    form.geocode_source === "google_geocode" &&\n'
              '    form.geocode_status === "success";'
          )
          replacement = (
              '  const hasAiGeocode =\n'
              '    hasUsableLatLng(form) &&\n'
              '    form.geocode_source === "google_geocode" &&\n'
              '    form.geocode_status === "success";\n'
              '  const skipBrowserGeocode = Boolean(form.geocode_checked_by_ai);'
          )
          if 'const skipBrowserGeocode = Boolean(form.geocode_checked_by_ai);' not in text:
              if needle not in text:
                  raise SystemExit('Could not find hasAiGeocode block')
              text = text.replace(needle, replacement, 1)

          # If AI scan already attempted geocode but did not return precise coords, save fallback without browser fetch.
          needle = (
              '    } else if (hasAiGeocode) {\n'
              '      // AI Scan already geocoded this address inside the Edge Function.\n'
              '    } else if (supabase && !isManualOverride && payload.street_address && payload.suburb) {'
          )
          replacement = (
              '    } else if (hasAiGeocode) {\n'
              '      // AI Scan already geocoded this address inside the Edge Function.\n'
              '    } else if (skipBrowserGeocode) {\n'
              '      payload.lat = fallbackLat;\n'
              '      payload.lng = fallbackLng;\n'
              '      payload.geocode_status = "failed";\n'
              '      payload.geocode_source = hasSuburbDefault ? "suburb_default" : "none";\n'
              '      payload.geocode_location_type = hasSuburbDefault ? "APPROXIMATE" : null;\n'
              '      payload.manual_location_override = false;\n'
              '      setError("Saved with suburb approximate location. AI geocode did not return precise coordinates.");\n'
              '    } else if (supabase && !isManualOverride && payload.street_address && payload.suburb) {'
          )
          if 'AI geocode did not return precise coordinates' not in text:
              if needle not in text:
                  raise SystemExit('Could not find geocode branch')
              text = text.replace(needle, replacement, 1)

          wf = Path('.github/workflows/skip-browser-geocode-after-ai.yml')
          if wf.exists():
              wf.unlink()

          app.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name "skip-browser-geocode-bot"
          git config user.email "skip-browser-geocode-bot@users.noreply.github.com"
          git add src/App.jsx .github/workflows/skip-browser-geocode-after-ai.yml
          git commit -m "Skip browser geocode after AI scan"
          git push
