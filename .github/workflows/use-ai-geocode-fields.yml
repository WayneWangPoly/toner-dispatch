name: Use AI geocode fields

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch App.jsx AI geocode mapping
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          app = Path('src/App.jsx')
          text = app.read_text()

          extracted_pattern = re.compile(
              r'      const extracted = \{\n'
              r'        docket_no: data\?\.docket_no \|\| "",\n'
              r'        equipment_id: data\?\.equip_no \|\| "",\n'
              r'        customer_name: data\?\.customer_name \|\| "",\n'
              r'        street_address: data\?\.street_address \|\| "",\n'
              r'        suburb: data\?\.suburb \|\| "",\n'
              r'        state: data\?\.state \|\| "SA",\n'
              r'        postcode: data\?\.postcode \|\| "",\n'
              r'        country: data\?\.country \|\| "Australia",\n'
              r'        toner_code: Array\.isArray\(data\?\.product_codes\) \? data\.product_codes\.join\(", "\) : "",\n'
              r'        priority: "Normal",\n'
              r'        notes: "",\n'
              r'      \};'
          )
          extracted_replacement = (
              '      const extracted = {\n'
              '        docket_no: data?.docket_no || "",\n'
              '        equipment_id: data?.equip_no || "",\n'
              '        customer_name: data?.customer_name || "",\n'
              '        street_address: data?.street_address || "",\n'
              '        suburb: data?.suburb || "",\n'
              '        state: data?.state || "SA",\n'
              '        postcode: data?.postcode || "",\n'
              '        country: data?.country || "Australia",\n'
              '        toner_code: Array.isArray(data?.product_codes) ? data.product_codes.join(", ") : "",\n'
              '        priority: "Normal",\n'
              '        notes: "",\n'
              '        lat: data?.lat != null ? String(data.lat) : "",\n'
              '        lng: data?.lng != null ? String(data.lng) : "",\n'
              '        geocode_status: data?.geocode_status || "pending",\n'
              '        geocode_source: data?.geocode_source || "none",\n'
              '        geocode_formatted_address: data?.geocode_formatted_address || "",\n'
              '        geocode_place_id: data?.geocode_place_id || "",\n'
              '        geocode_location_type: data?.geocode_location_type || "",\n'
              '        geocoded_at: data?.geocoded_at || "",\n'
              '        manual_location_override: false,\n'
              '      };'
          )
          text, count = extracted_pattern.subn(extracted_replacement, text, count=1)
          if count != 1:
              raise SystemExit('AI extracted object block not found or already patched')

          form_tail_pattern = re.compile(
              r'              priority: data\.priority \|\| "Normal",\n'
              r'              notes: data\.notes \|\| "",\n'
              r'              lat: defaults\.lat != null \? String\(defaults\.lat\) : "",\n'
              r'              lng: defaults\.lng != null \? String\(defaults\.lng\) : "",\n'
              r'            \}\);'
          )
          form_tail_replacement = (
              '              priority: data.priority || "Normal",\n'
              '              notes: data.notes || "",\n'
              '              lat: data.lat || (defaults.lat != null ? String(defaults.lat) : ""),\n'
              '              lng: data.lng || (defaults.lng != null ? String(defaults.lng) : ""),\n'
              '              geocode_status: data.geocode_status || (data.lat && data.lng ? "success" : "pending"),\n'
              '              geocode_source: data.geocode_source || (data.lat && data.lng ? "google_geocode" : "suburb_default"),\n'
              '              geocode_formatted_address: data.geocode_formatted_address || "",\n'
              '              geocode_place_id: data.geocode_place_id || "",\n'
              '              geocode_location_type: data.geocode_location_type || (data.lat && data.lng ? "ROOFTOP" : "APPROXIMATE"),\n'
              '              geocoded_at: data.geocoded_at || "",\n'
              '              manual_location_override: false,\n'
              '            });'
          )
          text, count = form_tail_pattern.subn(form_tail_replacement, text, count=1)
          if count != 1:
              raise SystemExit('onExtracted form tail block not found or already patched')

          old_is_manual = '  const isManualOverride = Boolean(form.manual_location_override) && hasUsableLatLng(form);'
          new_is_manual = (
              '  const isManualOverride = Boolean(form.manual_location_override) && hasUsableLatLng(form);\n'
              '  const hasAiGeocode =\n'
              '    hasUsableLatLng(form) &&\n'
              '    form.geocode_source === "google_geocode" &&\n'
              '    form.geocode_status === "success";'
          )
          if 'const hasAiGeocode' not in text:
              if old_is_manual not in text:
                  raise SystemExit('isManualOverride line not found')
              text = text.replace(old_is_manual, new_is_manual, 1)

          payload_pattern = re.compile(
              r'    geocode_status: isManualOverride \? "success" : "pending",\n'
              r'    geocode_source: isManualOverride \? "manual_override" : hasSuburbDefault \? "suburb_default" : "none",\n'
              r'    geocode_formatted_address: null,\n'
              r'    geocode_place_id: null,\n'
              r'    geocode_location_type: null,\n'
              r'    geocoded_at: isManualOverride \? new Date\(\)\.toISOString\(\) : null,\n'
              r'    manual_location_override: isManualOverride,'
          )
          payload_replacement = (
              '    geocode_status: isManualOverride || hasAiGeocode ? "success" : "pending",\n'
              '    geocode_source: isManualOverride ? "manual_override" : hasAiGeocode ? "google_geocode" : hasSuburbDefault ? "suburb_default" : "none",\n'
              '    geocode_formatted_address: hasAiGeocode ? form.geocode_formatted_address || null : null,\n'
              '    geocode_place_id: hasAiGeocode ? form.geocode_place_id || null : null,\n'
              '    geocode_location_type: hasAiGeocode ? form.geocode_location_type || null : null,\n'
              '    geocoded_at: isManualOverride ? new Date().toISOString() : hasAiGeocode ? form.geocoded_at || new Date().toISOString() : null,\n'
              '    manual_location_override: isManualOverride,'
          )
          text, count = payload_pattern.subn(payload_replacement, text, count=1)
          if count != 1:
              raise SystemExit('payload geocode block not found or already patched')

          branch_text = '    } else if (supabase && !isManualOverride && payload.street_address && payload.suburb) {'
          branch_replacement = (
              '    } else if (hasAiGeocode) {\n'
              '      // AI Scan already geocoded this address inside the Edge Function.\n'
              '    } else if (supabase && !isManualOverride && payload.street_address && payload.suburb) {'
          )
          if 'AI Scan already geocoded this address inside the Edge Function' not in text:
              if branch_text not in text:
                  raise SystemExit('geocode branch not found')
              text = text.replace(branch_text, branch_replacement, 1)

          wf = Path('.github/workflows/use-ai-geocode-fields.yml')
          if wf.exists():
              wf.unlink()

          app.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name "ai-geocode-fields-bot"
          git config user.email "ai-geocode-fields-bot@users.noreply.github.com"
          git add src/App.jsx .github/workflows/use-ai-geocode-fields.yml
          git commit -m "Use AI geocoded coordinates when saving scanned orders"
          git push
