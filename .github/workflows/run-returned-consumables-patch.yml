name: Run returned consumables patch

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-returned-consumables.mjs'
      - '.github/workflows/run-returned-consumables-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Apply patch
        run: node scripts/apply-returned-consumables.mjs
      - name: Build
        run: npm run build
      - name: Commit patched app
        run: |
          rm -f scripts/apply-returned-consumables.mjs .github/workflows/run-returned-consumables-patch.yml
          git config user.name "returned-consumables-bot"
          git config user.email "returned-consumables-bot@users.noreply.github.com"
          git add src/App.jsx scripts/apply-returned-consumables.mjs .github/workflows/run-returned-consumables-patch.yml
          git commit -m "Add returned consumables commission UI"
          git push
