name: Restore App from known good

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore App.jsx from known good commit and remove map hint
        run: |
          git checkout d6a03306fc9462624c7071bf3c082705641528b4 -- src/App.jsx
          python3 <<'PY'
          from pathlib import Path
          path = Path('src/App.jsx')
          text = path.read_text()
          hint = '            <p className="mt-1 text-xs text-slate-500">One finger to move. Two fingers to zoom. Same address is grouped with a number.</p>\n'
          text = text.replace(hint, '')
          wf = Path('.github/workflows/restore-app-from-known-good.yml')
          if wf.exists():
              wf.unlink()
          path.write_text(text)
          PY
      - name: Commit restore
        run: |
          git config user.name "known-good-restore-bot"
          git config user.email "known-good-restore-bot@users.noreply.github.com"
          git add src/App.jsx .github/workflows/restore-app-from-known-good.yml
          git commit -m "Restore App from known good and remove map hint"
          git push
